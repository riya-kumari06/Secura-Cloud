<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact Us - Secura Cloud</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .bg-gradient-navy-light-blue {
            background: linear-gradient(135deg, #0a192f 0%, #1e3a8a 100%);
        }
        .background-patterns {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .background-patterns .pattern {
            position: absolute;
            color: rgba(173, 216, 230, 0.05);
            font-size: 15rem;
            user-select: none;
            opacity: 0.5;
        }
</style>
</head>
<body class="bg-gray-900 text-white">
<div class="relative min-h-screen w-full bg-gradient-navy-light-blue">
<div class="background-patterns">
<span class="material-symbols-outlined pattern" style="top: 10%; left: 5%; transform: rotate(-25deg);">security</span>
<span class="material-symbols-outlined pattern" style="top: 70%; left: 85%; transform: rotate(15deg);">cloud_queue</span>
<span class="material-symbols-outlined pattern" style="top: 40%; left: 90%; transform: rotate(5deg);">shield</span>
<span class="material-symbols-outlined pattern" style="top: 85%; left: 10%; transform: rotate(20deg);">lock</span>
<span class="material-symbols-outlined pattern" style="top: 20%; left: 60%; transform: rotate(-10deg);">vpn_key</span>
</div>
<header class="relative z-20 flex items-center justify-between p-6">
<a class="flex items-center space-x-3" href="index.html">
<span class="material-symbols-outlined text-3xl text-[#60a5fa]">security</span>
<h1 class="text-2xl font-bold font-montserrat text-white">Secura Cloud</h1>
</a>
<nav class="hidden md:flex items-center space-x-6 text-white/80">
<a class="text-lg font-bold text-white/70" href="index.html">Home</a>
<a class="text-lg font-bold text-white/70 hover:text-primary transition-colors" href="file-list.html">File List</a>
<a class="text-lg font-bold text-white/70 hover:text-primary transition-colors" href="cloud-nodes.html">Cloud Nodes</a>
<a class="text-lg font-bold text-white/70 hover:text-primary transition-colors" href="contact.html">Contact Us</a>
</nav>
<button class="md:hidden">
<span class="material-symbols-outlined text-white text-3xl">menu</span>
</button>
</header>
<main class="relative z-10 flex min-h-[calc(100vh-140px)] flex-col items-center justify-center p-4">
<div class="w-full max-w-2xl">
<div class="rounded-xl bg-slate-800/50 p-8 text-center backdrop-blur-lg border border-white/10">
<h2 class="font-montserrat text-4xl font-bold text-white">Get in Touch</h2>
<p class="mt-2 text-white/60">We’d love to hear from you. Please fill out the form below.</p>
<form class="mt-8 space-y-6 text-left">
<div>
<label class="block text-sm font-medium text-white/80" for="name">Full Name</label>
<input class="mt-1 block w-full rounded-md border-slate-600 bg-slate-900/50 text-white placeholder-white/40 focus:border-[#60a5fa] focus:ring focus:ring-[#60a5fa] focus:ring-opacity-50" id="name" name="name" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-white/80" for="email">Email Address</label>
<input class="mt-1 block w-full rounded-md border-slate-600 bg-slate-900/50 text-white placeholder-white/40 focus:border-[#60a5fa] focus:ring focus:ring-[#60a5fa] focus:ring-opacity-50" id="email" name="email" type="email"/>
</div>
<div>
<label class="block text-sm font-medium text-white/80" for="message">Message</label>
<textarea class="mt-1 block w-full rounded-md border-slate-600 bg-slate-900/50 text-white placeholder-white/40 focus:border-[#60a5fa] focus:ring focus:ring-[#60a5fa] focus:ring-opacity-50" id="message" name="message" rows="4"></textarea>
</div>
<div class="text-center">
<button class="w-full max-w-xs rounded-lg bg-[#2563eb] py-3 text-lg font-semibold text-white transition-transform hover:scale-105 hover:bg-[#1d4ed8]" type="submit">
Send Message
</button>
</div>
</form>
</div>
</div>
</main>
<footer class="relative z-10 w-full p-4">
<p class="text-center text-sm text-white/50">© 2025 Secura Cloud. All Rights Reserved.</p>
</footer>
</div>
</body>
</html>
